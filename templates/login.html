<!DOCTYPE html>
<html>
<head>
    <title>Chess Login</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#131212;
            font-family:Arial;
            color:white;
        }

        .login-box{
            background:#222;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0 0 20px rgba(255,255,255,0.2);
        }

        h1{
            margin-bottom:30px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#00b894;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#00d8a7;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>♟ Chess Login</h1>

       <form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit" name="action" value="login">Login</button>
    <button type="submit" name="action" value="signup">Sign Up</button>
</form>
    </div>

</body>
</html>
